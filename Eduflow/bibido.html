<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduFlow</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>

  <body>
    <header
      class="bg-[#264E70]/75 w-300 h-auto mr-auto ml-auto mt-5 rounded-2xl shadow-lg"
    >
      <nav class="mx-auto flex items-center justify-between p-3">
        <!-- Logo -->
        <div class="flex lg:flex-1">
          <div
            class="text-[24px] font-mono font-semibold leading-6 tracking-wider ml-2"
          >
            <span class="text-[#FFFFFF] text-shadow-md">Edu</span
            ><span class="text-[#8CF9EB] text-shadow-md">Flow</span>
          </div>
        </div>
        <!-- Navigation Links -->
        <div
          class="flex font-mono text-[18px] font-semibold line tracking-wide lg:flex-2 lg:gap-x-10"
        >
          <a href="#" class="text-[#FFFFFF] no-underline text-shadow-md">Home</a>
          <div class="flex items-center">
            <button href="#" class="text-[#FFFFFF] no-underline text-shadow-md">
              Materi Kuliah
            </button>
            <svg
              viewBox="0 0 20 20"
              fill="currentColor"
              data-slot="icon"
              aria-hidden="true"
              class="size-5 flex-none in-aria-expanded:rotate-180 text-white"
            >
              <path
                d="M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06Z"
                clip-rule="evenodd"
                fill-rule="evenodd"
              />
            </svg>
          </div>
          <div class="flex items-center">
            <button href="#" class="text-[#FFFFFF] no-underline text-shadow-md">
              Lecture Note
            </button>
            <svg
              viewBox="0 0 20 20"
              fill="currentColor"
              data-slot="icon"
              aria-hidden="true"
              class="size-5 flex-none in-aria-expanded:rotate-180 text-white"
            >
              <path
                d="M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06Z"
                clip-rule="evenodd"
                fill-rule="evenodd"
              />
            </svg>
          </div>
          <div class="flex items-center">
            <button href="#" class="text-[#FFFFFF] no-underline text-shadow-md">
              Contact
            </button>
            <svg
              viewBox="0 0 20 20"
              fill="currentColor"
              data-slot="icon"
              aria-hidden="true"
              class="size-5 flex-none in-aria-expanded:rotate-180 text-white"
            >
              <path
                d="M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06Z"
                clip-rule="evenodd"
                fill-rule="evenodd"
              />
            </svg>
          </div>
        </div>

        <!--user account-->
        <div class="flex gap-x-3 mr-10 text-shadow-md">
          <img
            class="h-11 w-11 rounded-full bg-gray-50 border-2 border-indigo-600 shadow-md"
            src="/Akarin(frmwrk)/SELEE.jpg"
            alt=""
            />
            <div class="font-mono text-[12px] font-semibold line">
              <p class="tracking-wider text-white">
                Kyun
              </p>
              <p class="tracking-wider text-white">
                2109106045
                </p>
                <a href="#" class="tracking-wider text-[#8EFFEE] underline">kyunkyun06@email.com</a>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <!--hero-->
    <section class="mr-auto ml-auto bg-transparent flex items-center justify-between mt-6 max-w-306.25">
      <div class="mr-5 ml-5 max-w-165">
        <h1 class="text-[32px] font-mono font-semibold leading-10 tracking-wider mt-15 text-shadow-md">
          Selamat Datang di Edu<span class="text-[#2F39A1]">Flow</span>,<span class="text-[#0F4C81]">arsip materi Perkuliahan</span>
        </h1>
        <p class="text-[18px] font-mono font-normal leading-6 tracking-wide mt-15 text-shadow-md">
        Akses Materi kuliah secara gratis dan simple! 
        kamu juga bisa melihat lecture notes di setiap materi kuliah. 
        Ayo bergabung dengan komunitas EduFlow!
      </p>
        <div class="flex gap-x-14 items-center mt-15">
          <button class="bg-[#0F4C81] text-white px-4 py-2 rounded-md p-6 tracking-wider shadow-lg">
            Explore Materials
          </button>
          <button class="bg-[#00FFDE] text-black px-4 py-2 rounded-md p-6 tracking-wider shadow-lg">
            Join Lectures
          </button>
        </div>
      </div>
      <img src="Students studying.png" class="w-145 h-107 shadow-lg rounded-md mt-10"/>
    </section>
  </body>
</html>
